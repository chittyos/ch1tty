name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Verify servers.json is valid JSON
        run: node -e "JSON.parse(require(\"fs\").readFileSync(\"servers.json\",\"utf8\")); console.log(\"servers.json: valid\")"

  apps-build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [tasks-mcp, ledger-mcp, session-coordinator-mcp, evidence-mcp]
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: apps/${{ matrix.app }}/package-lock.json

      - name: Install dependencies (${{ matrix.app }})
        working-directory: apps/${{ matrix.app }}
        run: npm ci

      - name: Build (${{ matrix.app }})
        working-directory: apps/${{ matrix.app }}
        run: npm run build

      - name: Test (${{ matrix.app }})
        working-directory: apps/${{ matrix.app }}
        run: npm test

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --omit=dev || true
